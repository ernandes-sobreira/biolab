  `;
  document.getElementById('main-panel').innerHTML=`
    <div id="panel-atividade" class="panel active">
      <div class="student-wait"><div class="sw-icon">🔬</div><div class="sw-title">Aguardando atividade…</div><div class="sw-sub">O professor vai lançar em instantes.</div></div>
    </div>
    <div id="panel-turma" class="panel">
      <div class="ph"><div class="ph-title">Sala <em>${S.sala}</em></div></div>
      <div class="card" id="turma-list">Carregando...</div>
    </div>
    <div id="panel-glossario" class="panel">
      <div class="ph"><div class="ph-title">📚 <em>Glossário</em> Rápido</div></div>
      <div class="g2">
        ${[['x̄','Média','Soma dividida por n'],['Md','Mediana','Valor central ordenado'],['DP','Desvio Padrão','Dispersão em torno da média'],['EP','Erro Padrão','Incerteza da média (DP/√n)'],['CV','Coef. Variação','DP/média × 100 (%)'],['H₀','Hipótese Nula','Não há efeito/diferença'],['H₁','Hip. Alternativa','Há efeito/diferença'],['p','Valor-p','Prob. de obter resultado se H₀ for verdadeira'],['α','Nível de sig.','Limiar de decisão (geralmente 0,05)'],['IQR','Amp. Interquartil','Q3 − Q1 (50% centrais)']].map(([s,n,d])=>`
          <div class="stat-box c-gold" style="text-align:left;cursor:default">
            <div class="stat-sym" style="font-size:16px">${s}</div>
            <div style="font-size:13px;font-weight:700;color:var(--text);margin:4px 0">${n}</div>
            <div style="font-size:11px;color:var(--text2)">${d}</div>
          </div>`).join('')}
      </div>
    </div>
  `;
  listenAll();
  _onValue(_ref(db,`plstat/${S.sala}/alunos`),snap=>{
    const a=snap.val()||{};const el=document.getElementById('turma-list');
    if(el)el.innerHTML=Object.keys(a).map(n=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;display:flex;align-items:center;gap:10px"><span>👤</span>${n}${n===S.name?'<span style="font-size:10px;color:var(--green);font-weight:700;font-family:var(--font-m)"> • VOCÊ</span>':''}</div>`).join('');
  });
}

function renderStudentAct(act){
  const el=document.getElementById('panel-atividade');if(!el)return;
  if(!act){
    el.innerHTML=`<div class="student-wait"><div class="sw-icon">🔬</div><div class="sw-title">Aguardando atividade…</div><div class="sw-sub">O professor vai lançar em instantes.</div></div>`;
    return;
  }
  S.myVote=null;S.dragAnswers={};S.selectedMC=null;
  const types={numerica:'Pergunta Numérica',categorica:'Pergunta Categórica',arrastar:'Arrastar & Classificar',multipla:'Múltipla Escolha'};
  let body='';
  if(act.type==='numerica')body=`<input class="s-inp" id="s-num" type="number" placeholder="Digite o valor (${act.unit||'número'})" step="any"><button class="s-submit" onclick="sSubmitNum()">Enviar</button>`;
  else if(act.type==='categorica')body=`<input class="s-inp" id="s-cat" type="text" placeholder="Digite sua resposta"><button class="s-submit" onclick="sSubmitCat()">Enviar</button>`;
  else if(act.type==='multipla')body=`<div class="mc-opts">${act.options.map((o,i)=>`<button class="mc-opt" onclick="sMC(this,'${o.replace(/'/g,"\\'")}')"><span style="font-family:var(--font-m);font-size:11px;color:var(--text3);margin-right:10px">${String.fromCharCode(65+i)}</span>${o}</button>`).join('')}</div><button class="s-submit" id="smc-btn" disabled onclick="sSubmitMC()">Selecione uma opção</button>`;
  else if(act.type==='arrastar')body=sDragBody(act);

  el.innerHTML=`<div class="s-act-card">
    <div class="s-act-head"><div class="s-act-type">${types[act.type]||act.type}</div><div class="s-act-q">${act.question||'Classifique as variáveis'}</div></div>
    <div class="s-act-body" id="s-body">${body}</div>
  </div>`;
}

function sDragBody(act){
  const cards=(act.cards||[]).map(c=>`<div class="drag-card" draggable="true" data-card="${c}" ondragstart="dStart(event,'${c}')">${c}</div>`).join('');
  const zones=CATS.map(cat=>`
    <div style="border-radius:10px;padding:12px;border:2px dashed var(--border2);min-height:80px;transition:all .2s" data-cat="${cat.k}" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'${cat.k}')">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:${cat.c};font-family:var(--font-m);margin-bottom:8px">${cat.b} · ${cat.l}</div>
      <div id="zone-${cat.k}" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>`).join('');
  return`
    <div style="background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:14px;border:2px dashed var(--border2)" id="drag-pool" ondragover="dOver(event)" ondragleave="dLeave(event)" ondrop="dDrop(event,'pool')">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);font-family:var(--font-m);margin-bottom:8px">ARRASTE OS CARDS</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${cards}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">${zones}</div>
    <button class="s-submit" onclick="sSubmitDrag('${(act.cards||[]).join('|')}')">Enviar classificação</button>`;
}

let _dc=null;
function dStart(e,c){_dc=c;e.dataTransfer.effectAllowed='move';}
function dOver(e){e.preventDefault();e.currentTarget.style.borderColor='var(--accent)';}
function dLeave(e){e.currentTarget.style.borderColor='';}
function dDrop(e,cat){
  e.preventDefault();e.currentTarget.style.borderColor='';
  if(!_dc)return;const card=_dc;_dc=null;
  CATS.forEach(c=>{const z=document.getElementById('zone-'+c.k);if(z)z.querySelectorAll(`[data-card="${card}"]`).forEach(el=>el.remove());if(S.dragAnswers[card]===c.k)delete S.dragAnswers[card];});
  const pool=document.getElementById('drag-pool');
  if(pool)pool.querySelectorAll(`[data-card="${card}"]`).forEach(el=>el.remove());
  const cardEl=`<div class="drag-card" draggable="true" data-card="${card}" ondragstart="dStart(event,'${card}')">${card}</div>`;
  if(cat==='pool'){const p=document.getElementById('drag-pool');if(p)p.insertAdjacentHTML('beforeend',cardEl);}
  else{const z=document.getElementById('zone-'+cat);if(z)z.insertAdjacentHTML('beforeend',cardEl);S.dragAnswers[card]=cat;}
}

async function sSubmitNum(){const v=document.getElementById('s-num')?.value?.trim();if(!v||isNaN(+v)){showToast('⚠️ Valor numérico!');return;}await _set(_ref(db,`plstat/${S.sala}/activity/responses/${S.name}`),{value:+v,ts:Date.now()});sSuccess();}
async function sSubmitCat(){const v=document.getElementById('s-cat')?.value?.trim();if(!v){showToast('⚠️ Digite!');return;}await _set(_ref(db,`plstat/${S.sala}/activity/responses/${S.name}`),{value:v,ts:Date.now()});sSuccess();}
function sMC(btn,val){document.querySelectorAll('.mc-opt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');S.selectedMC=val;const sb=document.getElementById('smc-btn');if(sb){sb.disabled=false;sb.textContent='Enviar resposta';}}
async function sSubmitMC(){if(!S.selectedMC){showToast('⚠️ Selecione!');return;}await _set(_ref(db,`plstat/${S.sala}/activity/responses/${S.name}`),{value:S.selectedMC,ts:Date.now()});sSuccess();}
async function sSubmitDrag(cardsStr){
  const cards=cardsStr.split('|');
  const missing=cards.filter(c=>!S.dragAnswers[c]);
  if(missing.length){showToast(`⚠️ Classifique: ${missing.join(', ')}`);return;}
  await _set(_ref(db,`plstat/${S.sala}/activity/responses/${S.name}`),{...S.dragAnswers,ts:Date.now()});sSuccess();
}
function sSuccess(){const b=document.getElementById('s-body');if(!b)return;b.innerHTML=`<div class="s-success"><div class="s-success-icon">🎉</div><div class="s-success-txt">Resposta enviada!</div><div class="s-success-sub">Acompanhe os resultados com o professor.</div></div>`;}

/* ═══════════════════════════════════════════════
   PANEL: INSERIR DADOS MANUALMENTE
═══════════════════════════════════════════════ */
// Local data store for solo/professor manual entry
let _localData = {responses:{}, type:'numerica', question:'Dados inseridos manualmente', unit:''};

function pDadosManual(){return`
<div class="ph"><div class="ph-title">✏️ Inserir <em>Dados</em></div><div class="ph-sub">Insira dados manualmente para explorar os gráficos — sem precisar de alunos conectados.</div></div>
<div class="card">
  <div class="card-label">Tipo de dados</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">
    <button class="btn btn-ghost" id="dtbtn-num" onclick="setManualType('numerica',this)" style="border-color:var(--accent);color:var(--accent)">🔢 Numérico</button>
    <button class="btn btn-ghost" id="dtbtn-cat" onclick="setManualType('categorica',this)">🏷️ Categórico</button>
  </div>
  <div class="fld"><label>Título / Variável</label><input class="inp" id="m-title" placeholder="Ex: Altura dos alunos em cm" value="Dados da turma"></div>
  <div class="fld" id="m-unit-field"><label>Unidade (para numérico)</label><input class="inp" id="m-unit" placeholder="Ex: cm, kg, °C"></div>
  <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
    <div style="flex:1;min-width:160px">
      <label style="font-size:11px;color:var(--text3);font-family:var(--font-m);display:block;margin-bottom:4px">NOME DO PARTICIPANTE</label>
      <input class="inp" id="m-name" placeholder="Ex: Aluno 1">
    </div>
    <div style="flex:1;min-width:120px">
      <label style="font-size:11px;color:var(--text3);font-family:var(--font-m);display:block;margin-bottom:4px">VALOR</label>
      <input class="inp" id="m-value" placeholder="Ex: 170" id="m-value">
    </div>
    <button class="btn btn-gold" onclick="addManualEntry()">+ Adicionar</button>
  </div>
  <div style="margin-top:10px;font-size:12px;color:var(--text3)">Ou cole múltiplos valores separados por vírgula:</div>
  <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
    <input class="inp" id="m-bulk" placeholder="Ex: 165, 170, 175, 168, 182, 160" style="flex:1">
    <button class="btn btn-blue" onclick="addBulkEntries()">+ Bulk</button>
  </div>
</div>
<div class="card" id="m-entries-card" style="margin-top:14px">
  <div class="card-label" style="display:flex;justify-content:space-between;align-items:center">
    <span>Entradas (<span id="m-count">0</span>)</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-green" onclick="visualizarDados()" style="font-size:12px;padding:6px 14px">📊 Visualizar gráficos</button>
      <button class="btn btn-red" onclick="limparDados()" style="font-size:12px;padding:6px 14px">🗑 Limpar</button>
    </div>
  </div>
  <div id="m-entries-list" style="max-height:200px;overflow-y:auto;margin-top:8px">
    <div style="color:var(--text3);font-size:13px">Nenhum dado ainda.</div>
  </div>
</div>
`}

let _manualType='numerica';
function setManualType(t,btn){
  _manualType=t;
  document.querySelectorAll('[id^="dtbtn-"]').forEach(b=>{b.style.borderColor='';b.style.color='';});
  btn.style.borderColor='var(--accent)';btn.style.color='var(--accent)';
  document.getElementById('m-unit-field').style.display=t==='numerica'?'block':'none';
  _localData.type=t;
}

function addManualEntry(){
  const name=(document.getElementById('m-name')?.value?.trim())||('P'+(Object.keys(_localData.responses).length+1));
  const val=document.getElementById('m-value')?.value?.trim();
  if(!val){showToast('⚠️ Digite um valor!');return;}
  const key=name+'_'+Date.now();
  if(_manualType==='numerica'&&isNaN(parseFloat(val))){showToast('⚠️ Valor deve ser numérico!');return;}
  _localData.responses[key]={value:_manualType==='numerica'?parseFloat(val):val,ts:Date.now()};
  _localData.question=document.getElementById('m-title')?.value||'Dados manuais';
  _localData.unit=document.getElementById('m-unit')?.value||'';
  _localData.type=_manualType;
  document.getElementById('m-name').value='';
  document.getElementById('m-value').value='';
  renderManualList();
}

function addBulkEntries(){
  const raw=document.getElementById('m-bulk')?.value||'';
  const vals=raw.split(',').map(v=>v.trim()).filter(v=>v);
  if(!vals.length){showToast('⚠️ Nenhum valor encontrado!');return;}
  vals.forEach((v,i)=>{
    const key=`bulk_${i}_${Date.now()}`;
    if(_manualType==='numerica'&&isNaN(parseFloat(v)))return;
    _localData.responses[key]={value:_manualType==='numerica'?parseFloat(v):v,ts:Date.now()};
  });
  _localData.question=document.getElementById('m-title')?.value||'Dados manuais';
  _localData.unit=document.getElementById('m-unit')?.value||'';
  _localData.type=_manualType;
  document.getElementById('m-bulk').value='';
  renderManualList();showToast(`✅ ${vals.length} valores adicionados!`);
}

function renderManualList(){
  const entries=Object.entries(_localData.responses);
  document.getElementById('m-count').textContent=entries.length;
  const el=document.getElementById('m-entries-list');
  if(!el)return;
  if(!entries.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">Nenhum dado ainda.</div>';return;}
  el.innerHTML=`<table class="tbl"><thead><tr><th>ID</th><th>Valor</th><th></th></tr></thead><tbody>`+
    entries.slice(-20).reverse().map(([k,v])=>`
      <tr><td style="font-family:var(--font-m);font-size:11px;color:var(--text3)">${k.split('_')[0]}</td>
      <td style="font-weight:600">${v.value}</td>
      <td><button onclick="removeEntry('${k}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:13px">✕</button></td></tr>
    `).join('')+`</tbody></table>`;
}

function removeEntry(k){delete _localData.responses[k];renderManualList();}

function limparDados(){_localData.responses={};renderManualList();showToast('🗑 Dados limpos!');}

function visualizarDados(){
  if(!Object.keys(_localData.responses).length){showToast('⚠️ Adicione dados primeiro!');return;}
  S.activity=_localData;
  showPanel('aovivo');
  setTimeout(()=>renderLive(S.activity),100);
}

/* ═══════════════════════════════════════════════
   FIREBASE LISTENERS
═══════════════════════════════════════════════ */
function listenAll(){
  // Solo mode: skip Firebase listeners
  if(S.role==='solo')return;
  if(!window._db)return;

  const u1=_onValue(_ref(db,`plstat/${S.sala}/activity`),snap=>{
    const act=snap.val();S.activity=act;
    if(S.role==='aluno'){const sb=document.getElementById('s-body');if(!sb||!sb.querySelector('.s-success'))renderStudentAct(act);}
    if(S.role==='professor'&&S.activePanel==='aovivo')renderLive(act);
  });
  S.unsubs.push(()=>u1());
  if(S.role==='professor'){
    const u2=_onValue(_ref(db,`plstat/${S.sala}/alunos`),snap=>{
      const a=snap.val()||{};const el=document.getElementById('student-list');
      if(el)el.innerHTML=Object.keys(a).length?Object.keys(a).map(n=>`<div style="padding:7px 0;border-bottom:1px solid var(--border);font-size:14px">👤 ${n}</div>`).join(''):'<div style="color:var(--text3);font-size:13px">Aguardando alunos...</div>';
    });
    S.unsubs.push(()=>u2());
  }
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function showPanel(id){
  S.activePanel=id;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(n=>n.classList.remove('active'));
  const p=document.getElementById('panel-'+id);if(p)p.classList.add('active');
  document.querySelectorAll(`[data-p="${id}"]`).forEach(n=>n.classList.add('active'));
  if(id==='aovivo'&&S.activity)renderLive(S.activity);
  if(id==='descritiva')setTimeout(updateNormal,100);
  if(id==='testes')setTimeout(drawDecisionTree,100);
  if(id==='graficos')setTimeout(initGraficos,100);
}

function swtab(btn,tid){
  const parent=btn.closest('.stabs').parentElement;
  parent.querySelectorAll('.stab').forEach(b=>b.classList.remove('active'));
  parent.querySelectorAll('.stabp').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const t=document.getElementById(tid);if(t)t.classList.add('active');
  if(S.activity?.responses){
    const r=S.activity.responses;
    requestAnimationFrame(()=>{
      if(S.activity.type==='numerica')drawNum(r,S.activity.unit||'');
      else if(S.activity.type==='categorica')drawCat(r);
      else if(S.activity.type==='multipla')drawMC(S.activity,r);
      else if(S.activity.type==='arrastar')drawConsensus(S.activity,r);
    });
  }
}

/* ─── EXPORT ─── */
function dlPNG(id,name){
  const c=document.getElementById(id);if(!c){showToast('Canvas não encontrado');return;}
  const a=document.createElement('a');a.download=name+'.png';a.href=c.toDataURL('image/png');a.click();showToast('⬇ PNG baixado!');
}

async function dlCSV(){
  let act=S.activity;
  if(!act&&window._db){const snap=await _get(_ref(db,`plstat/${S.sala}/activity`));act=snap.val();}
  if(!act){showToast('Sem dados.');return;}
  const r=act.responses||{};
  let csv='aluno,tipo,resposta,timestamp\n';
  Object.entries(r).forEach(([n,v])=>{
    const val=typeof v==='object'&&v.value!==undefined?v.value:typeof v==='object'?JSON.stringify(v).replace(/"/g,'""'):v;
    csv+=`"${n}","${act.type}","${val}","${v.ts?new Date(v.ts).toISOString():''}"\n`;
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`penso_stat_sala${S.sala}_${Date.now()}.csv`;a.click();showToast('⬇ CSV baixado!');
}

/* ─── TOAST ─── */
function showToast(msg,d=3000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}

/* ─── KEYBOARD SHORTCUT ─── */
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('sc-login').classList.contains('active'))doLogin();});

/* ─── INIT: load recent rooms on page open ─── */
window.addEventListener('load',()=>{
  // Professor is default role — show rejoin section and recent rooms immediately
  loadRecentRooms();
  // fld-rejoin starts visible since professor is default
  const rejDiv=document.getElementById('fld-rejoin');
  if(rejDiv)rejDiv.style.display='block';
});
